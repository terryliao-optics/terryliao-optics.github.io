            <h2>爷爷昨天去世</h2>
            <p>2026年6月 · 文学</p>
        </div>

        <div class="article-body">
            <p>收到母亲电话的时候，我正在从球场回到宿舍的路上，从天桥上跨过川流不息的街道，一如爷爷跨过生死之间的界桥。本该七月流火的季节，空气却如火灼般发烫，让我愈发燥热不安。</p>
            <p>挂断电话，一时间我似乎没有什么特殊的感受，过去七年间，爷爷两次患上癌症，病痛在我眼前将那个和蔼博学的小老头逐渐变得形销骨立，曾经整洁的银发失去了条理，老年斑在爷爷枯瘦凹陷的面颊上爬过，每次学期结束回到家，爷爷的模样总是变化，而当我问他身体如何时，爷爷说，岁月没打算给他一个体面的衰老。所有身边人都清楚地感知到，死亡的高墙距离爷爷越来越近，</p>
        </div>
