<head>

    <style>
        .optics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            max-width: 900px;
        }
        .optics-card {
            background: #243d5c;
            border: 1px solid #3a5a80;
            color: #d0e4f5;
        }
        .optics-card .card-title { color: #d0e4f5; }
        .optics-card .card-desc { color: #8aabca; }
        .optics-card:hover {
            background: #2e4f73;
            border-color: #5a8ab0;
            transform: translateY(-3px);
        }
        .optics-card:hover {
            background: #ddeaf5;
            border-color: #2a6096;
            transform: translateY(-3px);
        }
        .optics-card .card-title {
            font-size: 1.05em;
            letter-spacing: 0.06em;
            margin-bottom: 10px;
            color: #1a3a5c;
        }
        .optics-card .card-desc {
            font-size: 0.85em;
            color: #5a7a9a;
            line-height: 1.8;
            letter-spacing: 0.03em;
        }
        .optics-card .card-meta {
            margin-top: 14px;
            font-size: 0.78em;
            color: #8aabca;
            letter-spacing: 0.04em;
        }
        #page-content {
            background: #1a2e4a;
            min-height: 100vh;
            padding: 56px 60px 80px;
        }
    </style>
</head>
